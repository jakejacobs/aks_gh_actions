apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node
  template:
    metadata:
      labels:
        app: node
    spec:
      containers:
        - name: backend
          image: ecommerceacrstudent123.azurecr.io/my-ecommerce-api:latest
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: backend-internal-service
spec:
  type: ClusterIP
  selector:
    app: node
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  # We removed the rewrite annotation completely
spec:
  ingressClassName: nginx # This officially links the rule to the NGINX controller
  rules:
    - http:
        paths:
          # Exact match: NGINX simply passes the exact URL through to the backend
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: backend-internal-service
                port:
                  number: 80
