apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node
  template:
    metadata:
      labels:
        app: node
    spec:
      containers:
        - name: backend
          image: acrghactions123.azurecr.io/my-ecommerce-api:latest
          ports:
            - containerPort: 3000

---
# CHANGED: This is now a private, internal-only service
apiVersion: v1
kind: Service
metadata:
  name: backend-internal-service
spec:
  type: ClusterIP
  selector:
    app: node
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---
# The Ingress Rule (The Routing Instructions for NGINX)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # If the user hits a bad URL, rewrite it cleanly
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - http:
        paths:
          # If someone goes to http://<YOUR_IP>/api, send them to the Node app
          - path: /api/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-internal-service
                port:
                  number: 80
